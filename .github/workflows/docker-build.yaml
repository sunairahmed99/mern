name: Build & Push MERN Docker Images

# Trigger workflow on push to main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Docker Buildx (multi-platform support)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Login to Docker Hub using secrets
      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4️⃣ Build Backend Docker Image
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest ./backend

      # 5️⃣ Build Frontend Docker Image
      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest ./frontend

      # 6️⃣ Push Backend Image to Docker Hub
      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest

      # 7️⃣ Push Frontend Image to Docker Hub
      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest
