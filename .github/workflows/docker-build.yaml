name: Build & Push MERN Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Debug step (safe, token not printed)
      - name: Debug Docker Secrets
        run: |
          echo "Docker username is '${{ secrets.DOCKER_USERNAME }}'"
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "DOCKER_PASSWORD secret is empty!"
            exit 1
          fi

      # 4️⃣ Docker Hub Login
      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5️⃣ Build Backend Docker Image with latest and commit SHA tags
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:${{ github.sha }} \
                       ./backend

      # 6️⃣ Build Frontend Docker Image with latest and commit SHA tags
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:${{ github.sha }} \
                       ./frontend

      # 7️⃣ Push Backend Images
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:${{ github.sha }}

      # 8️⃣ Push Frontend Images
      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:${{ github.sha }}
